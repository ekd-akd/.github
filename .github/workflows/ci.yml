name: ci (reusable)

# Org-wide minimum CI standard. Each repo calls this on PR + push to main:
#
#   name: ci
#   on:
#     pull_request:
#     push:
#       branches: [main]
#   jobs:
#     ci:
#       uses: ekd-akd/.github/.github/workflows/ci.yml@main
#       with:
#         language: python   # python | node | static
#
# It produces a single `ci` job that is meant to be the required status check on
# main — which both enforces the baseline and makes release-PR auto-merge valid.
#
# Philosophy: lint + format + test where they exist, fail loudly on real
# failures, and stay a trivial green for content-only repos. Steps self-skip
# when their tooling/config isn't present, so one workflow fits every repo.

on:
  workflow_call:
    inputs:
      language:
        description: "python | node | static"
        type: string
        required: true
      python-version:
        type: string
        required: false
        default: "3.12"
      node-version:
        type: string
        required: false
        default: "20"
      # Opt-in strict Python gates. Off by default so the baseline stays a
      # trivial green for content-only repos; a repo that wants the stricter
      # gate enables these explicitly (it is the caller's deliberate choice,
      # not a surprise that blocks every auto-merge).
      ruff-format:
        description: "python: enforce `ruff format --check`"
        type: boolean
        required: false
        default: false
      ty:
        description: "python: run the `ty` type checker"
        type: boolean
        required: false
        default: false
      ty-paths:
        description: "python: paths passed to `ty check`"
        type: string
        required: false
        default: "src"

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # ---- Python: ruff lint + format check, pytest when a suite exists --------
      - name: Set up uv
        if: ${{ inputs.language == 'python' }}
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ inputs.python-version }}

      # Lint only (respecting the repo's [tool.ruff] config). Format-enforcement
      # is intentionally NOT part of the baseline gate — adding it later is a
      # deliberate per-repo step, not a surprise that blocks every auto-merge.
      - name: Ruff lint
        if: ${{ inputs.language == 'python' }}
        run: uvx ruff check .

      # Opt-in (ruff-format: true): enforce formatting as a hard gate.
      - name: Ruff format check
        if: ${{ inputs.language == 'python' && inputs.ruff-format }}
        run: uvx ruff format --check .

      # Opt-in (ty: true): run the `ty` type checker over ty-paths. Needs the
      # project's deps, so sync first. Path comes via env (never interpolate a
      # caller input straight into the run line).
      - name: Ty type check
        if: ${{ inputs.language == 'python' && inputs.ty }}
        env:
          TY_PATHS: ${{ inputs.ty-paths }}
        run: |
          set -euo pipefail
          uv sync --all-extras --dev 2>/dev/null || uv sync 2>/dev/null || true
          uv run ty check $TY_PATHS

      - name: Pytest (only if a test suite is present)
        if: ${{ inputs.language == 'python' }}
        run: |
          set -euo pipefail
          # Detect a suite robustly: `ls a b c` exits non-zero if ANY glob is
          # unmatched, so it skipped real suites whenever only one naming
          # convention was present. compgen -G tests each pattern independently
          # and is true if any matches.
          if compgen -G "tests/test_*.py" >/dev/null || compgen -G "tests/*_test.py" >/dev/null || compgen -G "test_*.py" >/dev/null; then
            uv sync --all-extras --dev 2>/dev/null || uv sync 2>/dev/null || true
            uv run pytest -q
          else
            echo "no pytest suite found — skipping"
          fi

      # ---- Node/TS: install via the detected package manager, run scripts ------
      - name: Set up Node
        if: ${{ inputs.language == 'node' }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install + lint + build + test
        if: ${{ inputs.language == 'node' }}
        run: |
          set -euo pipefail
          if [ -f pnpm-lock.yaml ]; then
            corepack enable
            pnpm install --frozen-lockfile
            pnpm run --if-present lint
            pnpm run --if-present build
            pnpm run --if-present test
          elif [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile
            yarn run --if-present lint
            yarn run --if-present build
            yarn run --if-present test
          else
            npm ci || npm install
            npm run --if-present lint
            npm run --if-present build
            npm test --if-present
          fi

      # ---- Static / content repos: nothing to test, just confirm it's there ----
      - name: Static check
        if: ${{ inputs.language == 'static' }}
        run: |
          set -euo pipefail
          test -n "$(ls -A)" || { echo "::error::repository is empty"; exit 1; }
          echo "static repo — no build/test, ok"
