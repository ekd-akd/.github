# Place this file at: ekd-akd/.github/.github/workflows/nuk-deploy.yml
#
# Consumer repos call it with:
#
#   jobs:
#     deploy:
#       uses: ekd-akd/.github/.github/workflows/nuk-deploy.yml@main
#       secrets: inherit
#
# Conventions enforced by this workflow:
#   - Image is published to ghcr.io/<owner>/<repo> using built-in GITHUB_TOKEN
#   - Manifest must exist at .nuklaut/deployment.yml in the caller repo
#   - Per-app env file is at /opt/nuklaut/secrets/<repo>.env — written by this workflow
#     from the caller repo's APP_ENV secret (multiline key=value). No SSH needed.
#   - Org-shared env file is at /opt/nuklaut/secrets/_shared.env (rewritten on every deploy
#     from org-wide secrets listed below)
#   - The runner executes in a container as root (RUN_AS_ROOT) with /opt/nuklaut + the
#     docker socket bind-mounted, so it writes secrets and runs `nuk` directly — no sudo.

name: nuk-deploy (reusable)

on:
  workflow_call:
    inputs:
      dockerfile:
        description: Path to Dockerfile (relative to repo root)
        required: false
        type: string
        default: Dockerfile
      build_context:
        description: Docker build context
        required: false
        type: string
        default: "."
      manifest:
        description: Path to nuk manifest in the caller repo
        required: false
        type: string
        default: .nuklaut/deployment.yml
    secrets:
      APP_ENV:
        description: >
          Per-app secrets as a multiline key=value env file.
          Add this as a GitHub repo secret named APP_ENV.
          Written to /opt/nuklaut/secrets/<repo>.env on every deploy.
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: [self-hosted, akd]
    steps:
      - uses: actions/checkout@v4

      - name: Verify manifest exists
        run: |
          if [ ! -f "${{ inputs.manifest }}" ]; then
            echo "::error::Missing ${{ inputs.manifest }}. See examples/app-repo in the nuklaut repo."
            exit 1
          fi

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        env:
          IMG: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
        run: |
          docker build \
            -t "$IMG:${{ github.sha }}" \
            -t "$IMG:latest" \
            -f "${{ inputs.dockerfile }}" \
            "${{ inputs.build_context }}"

      - name: Push image
        env:
          IMG: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
        run: docker push --all-tags "$IMG"

      # Write per-app env file from the APP_ENV repo secret. Creates an empty file if the
      # secret is absent — nuk still references it via envFrom.secretRef, which is harmless.
      - name: Write per-app env file
        env:
          REPO: ${{ github.event.repository.name }}
          APP_ENV_CONTENT: ${{ secrets.APP_ENV }}
        run: |
          printf '%s\n' "$APP_ENV_CONTENT" \
            | install -m 600 /dev/stdin "/opt/nuklaut/secrets/${REPO}.env"

      # Write the shared env file on every deploy. Add new org-wide secrets here as needed —
      # they must be defined at https://github.com/organizations/<org>/settings/secrets/actions
      # and the caller workflow must use `secrets: inherit`.
      - name: Write org-shared env file
        env:
          SHARED_ENV: |
            # Managed by ekd-akd/.github nuk-deploy.yml. Regenerated on every deploy.
            SENTRY_DSN=${{ secrets.ORG_SENTRY_DSN }}
            OPENAI_API_KEY=${{ secrets.ORG_OPENAI_API_KEY }}
        run: |
          printf '%s\n' "$SHARED_ENV" \
            | install -m 600 /dev/stdin /opt/nuklaut/secrets/_shared.env

      # --repo-path skips nuk's internal git clone — works for private repos
      # without needing any auth on the controller (the runner already has the
      # checkout via the workflow's automatic GITHUB_TOKEN).
      - name: Apply manifest
        run: |
          /usr/local/bin/nuk apply \
            --repo-path "$GITHUB_WORKSPACE" \
            "${{ inputs.manifest }}"

      - name: Show deployment state
        run: /usr/local/bin/nuk list
