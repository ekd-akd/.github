name: Enforce Dependabot Config

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

# Requires ORG_PAT set as an org-level secret: a PAT with repo + workflow scopes.
# Without it the workflow warns and exits cleanly — it is never a hard failure.

permissions:
  contents: read

jobs:
  enforce-dependabot:
    runs-on: ubuntu-latest
    steps:
      - name: Add dependabot.yml to repos missing it
        env:
          GH_TOKEN: ${{ secrets.ORG_PAT }}
          ORG: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "::warning::ORG_PAT not set — skipping. Add a PAT with repo+workflow scopes as org secret ORG_PAT."
            exit 0
          fi

          CONTENT="dmVyc2lvbjogMgp1cGRhdGVzOgogIC0gcGFja2FnZS1lY29zeXN0ZW06IGdpdGh1Yi1hY3Rpb25zCiAgICBkaXJlY3Rvcnk6IC8KICAgIHNjaGVkdWxlOgogICAgICBpbnRlcnZhbDogd2Vla2x5CiAgICBncm91cHM6CiAgICAgIGdpdGh1Yi1hY3Rpb25zOgogICAgICAgIHBhdHRlcm5zOiBbIioiXQo="

          while IFS= read -r repo; do
            [[ "$repo" == "$ORG/.github" ]] && continue
            [[ "$repo" == "$ORG/.github-private" ]] && continue

            if gh api "repos/$repo/contents/.github/dependabot.yml" --silent 2>/dev/null; then
              echo "✓ $repo"
              continue
            fi

            echo "→ $repo missing dependabot.yml"
            default_branch=$(gh api "repos/$repo" --jq '.default_branch')
            base_sha=$(gh api "repos/$repo/git/ref/heads/$default_branch" --jq '.object.sha')
            branch="chore/add-dependabot"

            if gh api "repos/$repo/git/ref/heads/$branch" --silent 2>/dev/null; then
              echo "  branch already exists, skipping"
              continue
            fi

            gh api "repos/$repo/git/refs" -f ref="refs/heads/$branch" -f sha="$base_sha"
            gh api "repos/$repo/contents/.github/dependabot.yml"               --method PUT               -f message="chore: add dependabot config"               -f content="$CONTENT"               -f branch="$branch"
            gh api "repos/$repo/pulls"               -f title="chore: add dependabot config"               -f head="$branch"               -f base="$default_branch"               -f body="Adds `.github/dependabot.yml` to enable weekly automated dependency updates for GitHub Actions."
            echo "  PR opened in $repo"
          done < <(gh repo list "$ORG" --json nameWithOwner --limit 200 -q '.[].nameWithOwner')
